# Open-model catalog for Atropos ROI validation across scales.
# Two models are selected per size bucket from different families.
# Baselines are approximate references for planning; actual measured values are stored
# in validation_results/*.json after running scripts/validate_on_models.py.
models:
  - id: TinyLlama/TinyLlama-1.1B-Chat-v1.0
    alias: tinyllama_1_1b
    family: TinyLlama
    size_bucket: 1b
    params_b: 1.1
    download_url: https://huggingface.co/TinyLlama/TinyLlama-1.1B-Chat-v1.0
    realistic_deployment_rationale: >-
      Edge-friendly 1B chat model commonly used for latency-sensitive and
      cost-constrained inference workloads.
    expected_baselines:
      memory_gb_fp16: 3.0
      throughput_toks_per_sec_a100_40gb: 120.0
      power_watts: 175.0
      wikitext2_perplexity: 12.0
      humaneval_pass_at_1: 0.10
      requests_per_day: 200000
      tokens_per_request: 750
  - id: microsoft/phi-1_5
    alias: phi_1_5
    family: Phi
    size_bucket: 1b
    params_b: 1.3
    download_url: https://huggingface.co/microsoft/phi-1_5
    realistic_deployment_rationale: >-
      Widely referenced small model for practical coding assistants and
      low-cost batch jobs where 1B-class economics matter.
    expected_baselines:
      memory_gb_fp16: 3.4
      throughput_toks_per_sec_a100_40gb: 105.0
      power_watts: 180.0
      wikitext2_perplexity: 11.5
      humaneval_pass_at_1: 0.15
      requests_per_day: 200000
      tokens_per_request: 750

