seed: 1337
output_dir: validation_results/validation_2026_04
models_catalog: configs/validation_2026_04/models.yaml
fail_fast: false

execution:
  device_map: auto
  torch_dtype: float16
  max_new_tokens_humaneval: 256
  skip_existing_results: true

hardware:
  required_gpu: NVIDIA A100-SXM4-40GB
  min_gpu_memory_gb: 40
  min_system_ram_gb: 128
  target_cuda_major: 12
  power_sampling:
    method: nvidia-smi
    sample_interval_sec: 2

commercial:
  pricing_model: cloud
  electricity_cost_per_kwh: 0.12
  utilization: 0.9
  one_time_project_cost_usd: 25000

metrics:
  evaluate_perplexity: true
  evaluate_humaneval: true
  max_eval_samples: 64
  confidence_interval: 0.90
  baseline_guess_savings_fraction: 0.2

validation:
  pruning_strategies:
    - name: mild_20
      framework: wanda
      target_sparsity: 0.2
      kwargs:
        nsamples: 128
    - name: moderate_40
      framework: sparsegpt
      target_sparsity: 0.4
      kwargs:
        nsamples: 128
    - name: aggressive_60
      framework: sparsegpt
      target_sparsity: 0.6
      kwargs:
        nsamples: 128
  runtime_estimates_hours:
    7b: 4.0
    13b: 7.0
  significance:
    enabled: true
    alpha: 0.05
    minimum_models_per_bucket: 2
