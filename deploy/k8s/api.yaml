apiVersion: apps/v1
kind: Deployment
metadata:
  name: atropos-api
  namespace: atropos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atropos-api
  template:
    metadata:
      labels:
        app: atropos-api
    spec:
      containers:
        - name: api
          image: ghcr.io/its-not-rocket-science/atropos-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: atropos-config
            - secretRef:
                name: atropos-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: atropos-api
  namespace: atropos
spec:
  selector:
    app: atropos-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
