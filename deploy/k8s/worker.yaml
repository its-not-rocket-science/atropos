apiVersion: apps/v1
kind: Deployment
metadata:
  name: atropos-worker
  namespace: atropos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atropos-worker
  template:
    metadata:
      labels:
        app: atropos-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/its-not-rocket-science/atropos-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: atropos-config
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
