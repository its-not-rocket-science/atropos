apiVersion: v1
kind: ConfigMap
metadata:
  name: atropos-config
  namespace: atropos
data:
  ATROPOS_RUNTIME_PROFILE: production
  ATROPOS_HARDENING_TIER: production-safe
  ATROPOS_STORE_BACKEND: redis
  ATROPOS_REDIS_URL: redis://atropos-redis:6379/0
  ATROPOS_ALLOWED_ORIGINS: https://atropos.example.com
  ATROPOS_REQUIRE_HEALTH_ENDPOINTS: "true"
  ATROPOS_TRACING_ENABLED: "false"
  ATROPOS_LOG_FORMAT: json
  ATROPOS_API_BASE_URL: http://atropos-api:8000
  WORKER_POLL_INTERVAL_SECONDS: "5"
  WORKER_REQUEST_TIMEOUT_SECONDS: "2"
