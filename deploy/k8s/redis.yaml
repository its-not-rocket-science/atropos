apiVersion: apps/v1
kind: Deployment
metadata:
  name: atropos-redis
  namespace: atropos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atropos-redis
  template:
    metadata:
      labels:
        app: atropos-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: atropos-redis
  namespace: atropos
spec:
  selector:
    app: atropos-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
