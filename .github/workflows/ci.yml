name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-
            pip-${{ runner.os }}-
      - run: python -m pip install --upgrade pip --retries 3
      - run: pip install --retries 3 -e .[dev]
      - run: ruff check .
      - run: python scripts/check_release_hygiene.py
      - run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-
            pip-${{ runner.os }}-
      - run: python -m pip install --upgrade pip --retries 3
      - run: pip install --retries 3 -e .[dev]
      - run: mypy src

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HF_HOME: $HOME/tmp_cache/hf_cache
      TORCH_HOME: $HOME/tmp_cache/torch_cache
      ATROPOS_CI_TEST_SIMULATIONS: 50
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-
            pip-${{ runner.os }}-
      - run: python -m pip install --upgrade pip --retries 3
      - name: Install torch (prefer CPU wheels)
        run: |
          pip install --retries 3 torch --index-url https://download.pytorch.org/whl/cpu || \
          pip install --retries 3 torch
      - run: pip install --retries 3 -e .[dev]
      - run: python scripts/health_check.py
      - run: mkdir -p $HOME/tmp_cache
      - run: pytest -m "not integration and not stress" --cov-report=xml:coverage.xml
      - run: pytest -m "integration or stress" --cov-report=xml:coverage-integration.xml
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage-integration.xml
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-${{ matrix.python-version }}
          path: |
            **/test-results/*
            coverage.xml
            .coverage

  platform-core-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-3.12-
            pip-${{ runner.os }}-
      - run: python -m pip install --upgrade pip --retries 3
      - run: pip install --retries 3 -e .[dev]
      - run: python scripts/check_platform_core_invariants.py
      - run: pytest tests/test_runtime_server_storage.py tests/test_api_runtime_e2e_integration.py tests/test_structured_logging.py tests/test_runtime_controller.py tests/test_worker_runtime_observability.py

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: [lint, typecheck, test, platform-core-invariants]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-
      - run: python -m pip install --upgrade pip --retries 3
      - run: pip install --retries 3 build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/
